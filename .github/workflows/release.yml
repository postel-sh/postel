name: Release

# Lockstep release of the @postel/* npm packages and the Go compliance suite.
# Triggered ONLY by a pushed release tag — publishing never happens from a
# working tree (AGENTS.md). The single source of truth for the version is the
# tag; `release:verify-lockstep` fails the run if the committed tree (Go suite
# const, compliance CHANGELOG, every package.json) is not already at that version.
#
# Flow: tag vX.Y.Z (+ compliance/cli/vX.Y.Z) is pushed
#   -> gate            full quality + compliance + lockstep guard
#   -> publish-npm     pnpm publish -r (private packages skipped) with provenance
#   -> release-binary  cross-compile the compliance runner
#   -> github-release  create the GitHub Release, attach the runner binaries
#
# Required repository secret: NPM_TOKEN (npm automation token with publish rights
# to the @postel scope). Provenance needs the id-token: write permission below.
#
# Mechanism + rationale: decisions/0014-release-and-versioning-flow.md.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: read

jobs:
  gate:
    name: Gate + lockstep guard
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      dist_tag: ${{ steps.v.outputs.dist_tag }}
      prerelease: ${{ steps.v.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from tag
        id: v
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          if [[ "${version}" == *-* ]]; then
            echo "dist_tag=next" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - uses: jdx/mise-action@v2

      - name: Install TS workspace
        working-directory: typescript
        run: pnpm install --frozen-lockfile

      - name: Lockstep guard — npm packages and Go suite share ${{ steps.v.outputs.version }}
        run: mise run release:verify-lockstep "${{ steps.v.outputs.version }}"

      - name: Full release gate
        run: mise run release:gate

  publish-npm:
    name: Publish @postel/* to npm
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml

      - name: Install TS workspace
        working-directory: typescript
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        working-directory: typescript
        run: pnpm build

      - name: Stage LICENSE into publishable packages
        run: node scripts/release/sync-license.mjs

      - name: Publish (private packages are skipped automatically)
        working-directory: typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: pnpm publish -r --access public --no-git-checks --tag "${{ needs.gate.outputs.dist_tag }}"

  release-binary:
    name: Build compliance runner (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: gate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: windows, goarch: amd64, ext: ".exe" }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: compliance/cli/go.sum

      - name: Cross-compile
        working-directory: compliance/cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          out="../../dist/compliance-${{ needs.gate.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build -trimpath -ldflags "-s -w" -o "${out}" .

      - uses: actions/upload-artifact@v4
        with:
          name: compliance-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  github-release:
    name: Create GitHub Release
    needs: [gate, publish-npm, release-binary]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ needs.gate.outputs.prerelease == 'true' }}

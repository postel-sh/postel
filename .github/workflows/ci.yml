name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  spec:
    name: Spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate OpenSpec specs and changes
        run: npx openspec validate --all

      - name: Validate postel schema
        run: npx openspec schema validate postel --verbose

      - name: Spec-test traceability
        run: npm run check:spec-drift

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: spec
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # The following steps activate as the corresponding scripts land in
      # package.json. Until then they are no-ops thanks to --if-present.

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Lint
        run: npm run lint --if-present

      - name: Unit tests
        run: npm test --if-present

      - name: Bundle size budget
        run: npm run check:size --if-present

      - name: Compliance suite
        run: npm run test:compliance --if-present

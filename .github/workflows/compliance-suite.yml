name: Compliance suite

on:
  pull_request:
    paths:
      - "typescript/**"
      - "compliance/**"
      - "scripts/check-edge-bundle.mjs"
      - ".github/workflows/compliance-suite.yml"
      - "mise.toml"
  push:
    branches: [main]
    paths:
      - "typescript/**"
      - "compliance/**"
      - ".github/workflows/compliance-suite.yml"
      - "mise.toml"

permissions:
  contents: read

jobs:
  edge-smoke:
    name: Reference receiver smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @postel/edge (and dependents)
        run: pnpm --filter @postel/edge build

      - name: Reference receiver smoke test
        run: node scripts/smoke-receiver.mjs

  compliance-runner:
    name: '@postel/compliance against @postel/edge'
    runs-on: ubuntu-latest
    needs: edge-smoke
    steps:
      - uses: actions/checkout@v4

      - name: Detect compliance runner source
        id: detect
        run: |
          if [ -d compliance/cli ] && [ -f compliance/cli/go.mod ]; then
            echo "runner_present=true" >> "$GITHUB_OUTPUT"
          else
            echo "runner_present=false" >> "$GITHUB_OUTPUT"
            echo "compliance-suite: compliance/cli/ is not present in this revision."
            echo "compliance-suite: Track A's runner has not landed yet — convergence step skipped."
          fi

      - uses: pnpm/action-setup@v4
        if: steps.detect.outputs.runner_present == 'true'
        with:
          version: 10.33.4

      - uses: actions/setup-node@v4
        if: steps.detect.outputs.runner_present == 'true'
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml

      - uses: actions/setup-go@v5
        if: steps.detect.outputs.runner_present == 'true'
        with:
          go-version: stable
          cache-dependency-path: compliance/cli/go.sum

      - name: Install TS workspace
        if: steps.detect.outputs.runner_present == 'true'
        working-directory: typescript
        run: pnpm install --frozen-lockfile

      - name: Build @postel/edge
        if: steps.detect.outputs.runner_present == 'true'
        working-directory: typescript
        run: pnpm --filter @postel/edge build

      - name: Build compliance runner
        if: steps.detect.outputs.runner_present == 'true'
        working-directory: compliance/cli
        run: go build -o ../../compliance-runner .

      - name: Start reference receiver
        if: steps.detect.outputs.runner_present == 'true'
        working-directory: typescript
        env:
          PORT: "8787"
          POSTEL_DEDUP: "true"
          POSTEL_TOLERANCE: "300"
        run: |
          POSTEL_NOW=${POSTEL_NOW:-2026-05-14T16:00:00Z} \
            POSTEL_SECRETS=${POSTEL_SECRETS:-whsec_c2hvcnQtdGVzdC1maXh0dXJlLXNlY3JldC1mb3ItY2k=} \
            node scripts/reference-receiver.mjs &
          echo "RECEIVER_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 50); do
            if curl -fsS http://127.0.0.1:8787/.well-known/webhooks-keys >/dev/null 2>&1 \
              || curl -fsS -o /dev/null -w '%{http_code}\n' http://127.0.0.1:8787/ | grep -q '404\|400'; then
              echo "reference receiver up"
              break
            fi
            sleep 0.1
          done

      - name: Run @postel/compliance suite
        if: steps.detect.outputs.runner_present == 'true'
        env:
          POSTEL_TARGET: http://127.0.0.1:8787/webhooks
        run: |
          if [ -d compliance/vectors ]; then
            ./compliance-runner \
              --target "$POSTEL_TARGET" \
              --vectors compliance/vectors \
              --format json
          else
            echo "compliance-suite: compliance/vectors/ is empty — runner has no corpus to drive yet."
            echo "compliance-suite: vacuous pass until Track A authors v0.1.0 vectors."
          fi

      - name: Stop reference receiver
        if: always() && env.RECEIVER_PID != ''
        run: kill ${RECEIVER_PID} || true

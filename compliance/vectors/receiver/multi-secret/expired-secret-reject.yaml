id: receiver/multi-secret/expired-secret-reject
requirement:
  capability: receiver
  title: Multi-secret window
description: |
  Request signed with hmac_alt — a key the receiver has NOT been
  configured to accept (it has rotated out of the array, or never was
  in it). The receiver tries every entry in its secrets array
  [primary=hmac_primary, verifying=hmac_secondary], finds no match
  for hmac_alt's signature, and rejects with SIGNATURE_INVALID.
  Asserts the rotation window has a definite end: once a secret is
  out of the array, it no longer verifies.

  Mechanically equivalent to signature-v1/wrong-key against the same
  receiver config — the two vectors differ in intent (rotation
  semantics vs. foreign-key semantics), not in mechanism.
input:
  method: POST
  url: /webhooks
  headers:
    webhook-id: msg_multisecret_expired_reject
    webhook-timestamp: "{{now}}"
  body_b64: eyJ0eXBlIjoidGVzdC5oZWxsbyIsInRpbWVzdGFtcCI6IjIwMjYtMDEtMDFUMDA6MDA6MDBaIiwiZGF0YSI6eyJoZWxsbyI6IndvcmxkIn19
secrets:
  - id: foreign
    fixture: hmac_alt.yaml
signature_mode: computed
expected:
  outcome: reject
  error_code: SIGNATURE_INVALID

id: receiver/multi-secret/old-secret-accept
requirement:
  capability: receiver
  title: Multi-secret window
description: |
  Request signed with the verifying-secondary (hmac_secondary) — the
  "old" slot in the receiver's rotation array. The receiver tries each
  configured secret in order and accepts because the signature matches
  the secondary. Asserts the receiver's multi-secret window honors
  every entry in the priority-ordered array, not just the primary.

  Receiver-under-test prerequisite: secrets array configured as
  [primary=hmac_primary, verifying=hmac_secondary]. This is the same
  receiver config used by the expired-secret-reject vector — the two
  vectors split on whether the signing key is in the array.
input:
  method: POST
  url: /webhooks
  headers:
    webhook-id: msg_multisecret_old_accept
    webhook-timestamp: "{{now}}"
  body_b64: eyJ0eXBlIjoidGVzdC5oZWxsbyIsInRpbWVzdGFtcCI6IjIwMjYtMDEtMDFUMDA6MDA6MDBaIiwiZGF0YSI6eyJoZWxsbyI6IndvcmxkIn19
secrets:
  - id: secondary
    fixture: hmac_secondary.yaml
signature_mode: computed
expected:
  outcome: accept

id: receiver/raw-bytes/byte-identical-accept
requirement:
  capability: receiver
  title: Framework adapters preserve raw bytes
description: |
  Round-trip happy path: the runner signs the body bytes and ships them
  byte-identically to the receiver. The receiver's framework adapter is
  expected to feed verify the SAME bytes (no JSON re-serialization, no
  re-encoding). Signature matches, accept. This vector anchors the
  raw-bytes dimension: if it fails on a receiver, the framework
  adapter is dropping or mutating bytes before they reach verify.
input:
  method: POST
  url: /webhooks
  headers:
    webhook-id: msg_rawbytes_identical
    webhook-timestamp: "{{now}}"
  body_b64: eyJ0eXBlIjoidGVzdC5oZWxsbyIsImRhdGEiOnsia2V5IjoidmFsdWUifX0=
secrets:
  - id: primary
    fixture: hmac_primary.yaml
signature_mode: computed
expected:
  outcome: accept

id: receiver/dedup/concurrent-atomicity
requirement:
  capability: receiver
  title: Idempotency dedup helper
description: |
  Single-request stand-in for the receiver capability spec's
  "Concurrent dedup calls" scenario: under two concurrent calls with
  the same id, exactly one returns non-duplicate and the other
  returns duplicate. The compliance vector schema models one HTTP
  exchange per vector, so true concurrent semantics are not directly
  testable from the suite at v0.1.0; the receiver's own unit tests
  cover atomicity.

  As a partial HTTP-observable check, this vector sends ONE request
  with a fresh id (msg_dedup_atomic_b) and asserts accept. The
  receiver-implementation test suite is responsible for racing two
  concurrent dispatches and asserting exactly-once non-duplicate. The
  v0.2.0 vector schema extension for multi-step / concurrent sequences
  will let this vector grow to its full form.
input:
  method: POST
  url: /webhooks
  headers:
    webhook-id: msg_dedup_atomic_b
    webhook-timestamp: "{{now}}"
  body_b64: eyJ0eXBlIjoidGVzdC5oZWxsbyIsInRpbWVzdGFtcCI6IjIwMjYtMDEtMDFUMDA6MDA6MDBaIiwiZGF0YSI6eyJoZWxsbyI6IndvcmxkIn19
secrets:
  - id: primary
    fixture: hmac_primary.yaml
signature_mode: computed
expected:
  outcome: accept

id: sender/filtering/transform-reshapes-body
mode: sender
requirement:
  capability: filtering-transformation
  title: Transform produces body to send
description: An endpoint transform reshapes the outgoing body — observed body matches the transform output rather than the original event.data.
secrets:
  - id: primary
    fixture: hmac_primary.yaml
triggers:
  - op: register_endpoint
    as: ep_tf
    endpoint:
      url: "{{mock_receiver_url}}/tf"
      types: ["order.created"]
      signing: { fixture_id: hmac_primary }
  - op: start_workers
    concurrency: 1
  - op: send
    event: { type: order.created, data: { id: "ord_1", amount_cents: 4200 } }
  - op: wait_for
    request_count: 1
    timeout_ms: 3000
expected_requests:
  - endpoint: ep_tf
expected:
  outcome: accept

id: sender/filtering/channel-filter-match
mode: sender
requirement:
  capability: filtering-transformation
  title: Channel filter
description: Endpoint subscribed to tenant_42 receives messages whose channels contain tenant_42.
secrets:
  - id: primary
    fixture: hmac_primary.yaml
triggers:
  - op: register_endpoint
    as: ep_ch
    endpoint:
      url: "{{mock_receiver_url}}/ch"
      channels: ["tenant_42"]
      signing: { fixture_id: hmac_primary }
  - op: start_workers
    concurrency: 1
  - op: send
    event: { type: order.created, channels: ["tenant_42"] }
  - op: wait_for
    request_count: 1
    timeout_ms: 3000
expected_requests:
  - endpoint: ep_ch
expected:
  outcome: accept

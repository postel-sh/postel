id: sender/ssrf-tls/ssrf-private-ip-dispatch-blocked
mode: sender
requirement:
  capability: sender
  title: SSRF protection on outbound delivery
description: With SSRF allowed at create time, a private-IP URL still records the dispatch attempt as status=ssrf-blocked at dispatch time when the dispatch-time policy blocks it.
secrets:
  - id: primary
    fixture: hmac_primary.yaml
triggers:
  - op: register_endpoint
    as: ep_blocked_dispatch
    endpoint:
      url: "http://10.0.0.5/hook"
      types: ["evt.x"]
      allowHttp: true
      signing: { fixture_id: hmac_primary }
  - op: start_workers
    concurrency: 1
  - op: send
    event: { type: evt.x }
  - op: wait_for
    request_count: 0
    timeout_ms: 2000
expected_requests:
  - endpoint: ep_blocked_dispatch
    attempt_status: ssrf-blocked
expected:
  outcome: accept

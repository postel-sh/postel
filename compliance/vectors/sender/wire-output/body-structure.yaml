id: sender/wire-output/body-structure
mode: sender
requirement:
  capability: standard-webhooks-compliance
  title: Compliant headers, signatures, payload structure, and prefixes by default
description: Outgoing body matches the Standard Webhooks payload shape { type, timestamp, data }.
secrets:
  - id: primary
    fixture: hmac_primary.yaml
triggers:
  - op: register_endpoint
    as: ep_main
    endpoint:
      url: "{{mock_receiver_url}}/hook"
      types: ["order.created"]
      signing: { fixture_id: hmac_primary }
  - op: start_workers
    concurrency: 1
  - op: send
    event: { type: order.created, data: { id: "ord_1" } }
  - op: wait_for
    request_count: 1
    timeout_ms: 3000
expected_requests:
  - endpoint: ep_main
    body_json_equals:
      type: order.created
      data: { id: "ord_1" }
expected:
  outcome: accept

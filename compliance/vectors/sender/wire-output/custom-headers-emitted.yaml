id: sender/wire-output/custom-headers-emitted
mode: sender
requirement:
  capability: sender
  title: Per-endpoint custom HTTP headers
description: Endpoint with static custom headers emits them on every outgoing request.
secrets:
  - id: primary
    fixture: hmac_primary.yaml
triggers:
  - op: register_endpoint
    as: ep_main
    endpoint:
      url: "{{mock_receiver_url}}/hook"
      types: ["evt.x"]
      headers: { "x-tenant": "acme", "x-region": "eu-west-1" }
      signing: { fixture_id: hmac_primary }
  - op: start_workers
    concurrency: 1
  - op: send
    event: { type: evt.x }
  - op: wait_for
    request_count: 1
    timeout_ms: 3000
expected_requests:
  - endpoint: ep_main
    headers_match: { "x-tenant": "acme", "x-region": "eu-west-1" }
expected:
  outcome: accept

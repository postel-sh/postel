id: sender/late-binding/transform-changed-between-retries
mode: sender
requirement:
  capability: filtering-transformation
  title: Late binding at dispatch time
description: A failed first attempt followed by an endpoint config change uses the updated config on the retry — late binding holds across the retry window.
secrets:
  - id: primary
    fixture: hmac_primary.yaml
mock_receiver:
  scripted_responses:
    - { status: 500 }
    - { status: 200 }
triggers:
  - op: register_endpoint
    as: ep_lb
    endpoint:
      url: "{{mock_receiver_url}}/lb"
      types: ["order.created"]
      retryPolicy: { schedule: ["200ms"], jitter: 0, maxAttempts: 2 }
      signing: { fixture_id: hmac_primary }
  - op: start_workers
    concurrency: 1
  - op: send
    event: { type: order.created, data: { v: 1 } }
  - op: wait_for
    request_count: 2
    timeout_ms: 4000
expected_requests:
  - endpoint: ep_lb
    attempt_status: failed
  - endpoint: ep_lb
    attempt_status: success
expected:
  outcome: accept

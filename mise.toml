# Postel repo-level tooling.
#
# Run `mise install` once to install Node and the OpenSpec CLI binary.
# After that:
#   - `mise run <task>` to invoke a task (see below)
#   - `openspec ...` works directly on PATH (no `npx` indirection)
#
# Per-language tooling (TypeScript / Go / Python / Rust) lives inside
# each language's root directory, not here. The top-level config is
# deliberately language-agnostic. See `decisions/0006-monorepo-layout.md`.

[tools]
node = "20"
go = "1.26"
"npm:@fission-ai/openspec" = "1.3.1"

[tasks."spec:validate"]
description = "Validate all OpenSpec specs and changes"
run = "openspec validate --all"

[tasks."spec:schema-validate"]
description = "Validate the postel custom schema"
run = "openspec schema validate postel --verbose"

[tasks."check:spec-drift"]
description = "Check spec-test traceability — every requirement must have a matching test"
run = "node scripts/check-spec-drift.mjs"

[tasks."check:all"]
description = "Run the full spec-level CI gate locally"
depends = ["spec:validate", "spec:schema-validate", "check:spec-drift"]

# TypeScript port — thin delegations into typescript/ via pnpm.
# Tooling rationale: decisions/0010-typescript-toolchain.md.

[tasks."typecheck"]
description = "Run TypeScript typecheck across the TS port (delegates to pnpm)"
dir = "typescript"
run = "pnpm typecheck"

[tasks."lint"]
description = "Lint + format check the TS port via Biome (delegates to pnpm)"
dir = "typescript"
run = "pnpm lint"

[tasks."test"]
description = "Run the TS port test suites via Vitest (delegates to pnpm)"
dir = "typescript"
run = "pnpm test"

[tasks."build"]
description = "Build all TS packages (ESM + CJS + types) via tsup (delegates to pnpm)"
dir = "typescript"
run = "pnpm build"

# Compliance suite (Go runner) — thin delegations into compliance/cli/.
# Tooling rationale: decisions/0011-compliance-suite-tooling.md.

[tasks."compliance:test"]
description = "Run the compliance runner Go tests"
dir = "compliance/cli"
run = "go test ./..."

[tasks."compliance:build"]
description = "Build the compliance runner binary for the current platform"
dir = "compliance/cli"
run = "go build -o ../../bin/compliance ."

[tasks."compliance:vet"]
description = "Run go vet on the compliance runner"
dir = "compliance/cli"
run = "go vet ./..."

[tasks."compliance:sender:ts"]
description = "Run the v0.2.0 sender corpus against the TS @postel/compliance-driver"
run = """
# Build the runner and the TS driver, then exercise the sender corpus.
# pnpm runs with -C typescript because the workspace lives there (the repo
# root has no package.json / pnpm-workspace.yaml).
mise run compliance:build
pnpm -C typescript --filter @postel/compliance-driver build
node typescript/packages/compliance-driver/dist/cli.js --port 0 > /tmp/postel-driver.json &
DRIVER_PID=$!
trap "kill $DRIVER_PID 2>/dev/null" EXIT
sleep 1
PORT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('/tmp/postel-driver.json','utf8')).port)")
./bin/compliance --sender-control "http://127.0.0.1:$PORT" --vectors compliance/vectors --schema-dir compliance/schema --format json
"""

# Documentation site (Fumadocs / Next.js) — thin delegations into docs/.
# Standalone Node install at docs/, not part of the typescript/ workspace
# (cross-cutting like compliance/, per decisions/0006-monorepo-layout.md).

[tasks."docs:dev"]
description = "Run the docs site locally at http://localhost:3000"
dir = "docs"
run = "pnpm dev"

[tasks."docs:build"]
description = "Production build of the docs site"
dir = "docs"
run = "pnpm build"

[tasks."docs:typecheck"]
description = "Typecheck the docs site"
dir = "docs"
run = "pnpm typecheck"

# Release flow — lockstep versioning across the npm packages and the Go
# compliance suite (VISION.md §8). One version in, every artifact stamped by a
# single writer; the actual publish is gated to CI on a pushed tag, never from a
# working tree. Mechanism + rationale: decisions/0014-release-and-versioning-flow.md.

[tasks."release:stamp"]
description = "Stamp <version> into the Go suite const, the compliance CHANGELOG, and every @postel/* package.json"
usage = 'arg "<version>"'
run = 'node scripts/release/stamp-version.mjs "$usage_version"'

[tasks."release:verify-lockstep"]
description = "Assert every release artifact already sits at <version> — no writes (CI lockstep guard)"
usage = 'arg "<version>"'
run = 'node scripts/release/stamp-version.mjs "$usage_version" --check'

[tasks."release:sync-license"]
description = "Copy the root LICENSE into every publishable @postel/* package before publish"
run = "node scripts/release/sync-license.mjs"

[tasks."compliance:receiver:ts"]
description = "Run the receiver compliance corpus against the reference TS receiver"
run = """
mise run compliance:build
pnpm -C typescript --filter @postel/core build
PORT=8787 node typescript/scripts/reference-receiver.mjs &
RECV=$!
trap "kill $RECV 2>/dev/null" EXIT
for _ in $(seq 1 50); do curl -fsS -o /dev/null http://127.0.0.1:8787/.well-known/webhooks-keys && break; sleep 0.1; done
./bin/compliance --target http://127.0.0.1:8787/webhooks --vectors compliance/vectors --schema-dir compliance/schema --now "$POSTEL_NOW" --format text
"""

[tasks."compliance:receiver:ts".env]
POSTEL_NOW = "2026-01-01T00:00:00Z"
POSTEL_TOLERANCE = "300"
POSTEL_DEDUP = "true"
POSTEL_DEDUP_PRESEED = "pre_seen_"
POSTEL_SECRETS = "whsec_q6urq6urq6urq6urq6urq6urq6urq6urq6urq6urq6s=,whsec_VlZWVlZWVlZWVlZWVlZWVlZWVlZWVlZWVlZWVlZWVlY=,whpk_/JR3MPSesBQnpm4FBzMpTZ5SDlRceicSWngGNOCGCic="
POSTEL_JWKS_KEYS = '[{"kty":"OKP","crv":"Ed25519","alg":"EdDSA","kid":"kid_a","x":"_JR3MPSesBQnpm4FBzMpTZ5SDlRceicSWngGNOCGCic"},{"kty":"OKP","crv":"Ed25519","alg":"EdDSA","kid":"kid_b","x":"IEBA42TBDyvsnB_lAKHNTCR8idZQoB7X6CyrqGeHfCE","not_after":"2025-01-01T00:00:00Z"}]'

[tasks."release:gate"]
description = "Full pre-release gate: TS quality + spec drift + Go suite + receiver & sender compliance"
depends = ["check:all", "lint", "typecheck", "build", "test", "compliance:vet", "compliance:test"]
run = """
mise run compliance:receiver:ts
mise run compliance:sender:ts
"""

[tasks."release:prepare"]
description = "Stamp <version> across all artifacts and run the full gate. Does NOT tag or publish."
usage = 'arg "<version>"'
run = """
version="$usage_version"
mise run release:stamp "$version"
mise run release:gate
echo ""
echo "prepared release $version. Next:"
echo "  1. review the diff; commit on a release branch and open a PR"
echo "  2. once merged + green:  mise run release:tag $version"
echo "  3. git push origin v$version compliance/cli/v$version   (this triggers publish)"
"""

[tasks."release:tag"]
description = "Create the v<version> and compliance/cli/v<version> tags at HEAD (does not push)"
usage = 'arg "<version>"'
run = """
version="$usage_version"
mise run release:verify-lockstep "$version"
git tag -a "v$version" -m "release v$version"
git tag -a "compliance/cli/v$version" -m "@postel/compliance v$version"
echo "tagged v$version and compliance/cli/v$version (not pushed)."
echo "publish:  git push origin v$version compliance/cli/v$version"
"""
